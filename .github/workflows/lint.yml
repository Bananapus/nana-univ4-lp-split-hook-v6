name: lint
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  forge-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install npm dependencies
        run: npm ci
      - name: Check linting
        run: forge fmt --check
